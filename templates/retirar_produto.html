{% extends 'base.html' %}

{% block content %}
<div class="mb-8 mt-2 flex justify-between items-start">
    <div class="flex items-center gap-3">
        <a href="/" class="text-secondary bg-secondary-container p-2 rounded-full active:scale-95 transition-transform flex items-center justify-center no-underline">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div>
            <h2 class="text-2xl font-extrabold text-on-surface">Retirar Produto</h2>
            <p class="text-on-surface-variant font-medium text-sm mt-1">Registre a saída para consumo da cozinha.</p>
        </div>
    </div>
</div>

<form action="/retirar-produto" method="POST" class="flex flex-col gap-5">
    
    <div>
        <label class="block text-sm font-bold text-on-surface-variant mb-2 uppercase tracking-wider">Selecione o Produto</label>
        <select name="produto_id" id="produto_select" class="w-full p-4 bg-surface-container rounded-2xl outline-none border border-transparent focus:border-primary transition-colors text-lg font-semibold" required onchange="atualizarInfoLote()">
            <option value="" disabled selected>Toque para escolher...</option>
            {% for p in produtos %}
            <option value="{{ p.id }}">{{ p.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <div id="box-info-lote" class="hidden bg-tertiary-container text-on-tertiary-container p-4 rounded-2xl border border-tertiary/20 flex flex-col gap-1 shadow-sm">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-tertiary">event_available</span>
            <span class="font-bold text-sm uppercase tracking-wider">Atenção! Pegue o lote de: <span id="txt-validade" class="text-base font-black text-tertiary"></span></span>
        </div>
        <p class="text-sm font-medium opacity-80 pl-8 mt-1">Restam neste lote: <span id="txt-qtd" class="font-bold"></span></p>
    </div>

    <div id="box-sem-estoque" class="hidden bg-red-50 text-red-700 p-4 rounded-2xl border border-red-200 flex items-center gap-2 shadow-sm">
        <span class="material-symbols-outlined">error</span>
        <span class="font-bold text-sm">Atenção: Este produto consta como ZERADO no sistema.</span>
    </div>

    <div>
        <label class="block text-sm font-bold text-on-surface-variant mb-2 uppercase tracking-wider">Quantidade Retirada</label>
        <input type="number" step="0.01" name="quantidade" id="input-qtd" placeholder="Ex: 2" required class="w-full p-4 bg-surface-container rounded-2xl outline-none border border-transparent focus:border-primary transition-colors text-lg font-semibold">
    </div>

    <button type="submit" id="btn-salvar" class="mt-4 bg-primary text-on-primary p-4 rounded-full font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg">
        <span class="material-symbols-outlined">pan_tool</span> Registrar Baixa
    </button>
</form>

<script>
    // O Jinja injeta o dicionário Python direto para o Javascript ler
    const infoLotes = {{ info_lotes | tojson | safe }};

    function atualizarInfoLote() {
        const select = document.getElementById('produto_select');
        const produtoId = select.value;
        
        const boxInfo = document.getElementById('box-info-lote');
        const boxSemEstoque = document.getElementById('box-sem-estoque');
        const txtValidade = document.getElementById('txt-validade');
        const txtQtd = document.getElementById('txt-qtd');
        const btnSalvar = document.getElementById('btn-salvar');
        const inputQtd = document.getElementById('input-qtd');

        // Esconde as mensagens sempre que trocar
        boxInfo.classList.add('hidden');
        boxSemEstoque.classList.add('hidden');

        if (produtoId && infoLotes[produtoId]) {
            // Se o produto existe e tem estoque físico
            const info = infoLotes[produtoId];
            txtValidade.textContent = info.validade;
            txtQtd.textContent = info.qtd_disponivel + ' ' + info.unidade;
            boxInfo.classList.remove('hidden');
            
            // Garante que o botão está liberado
            btnSalvar.disabled = false;
            btnSalvar.classList.remove('opacity-50', 'cursor-not-allowed');
            inputQtd.disabled = false;

        } else if (produtoId) {
            // Se selecionou o produto, mas ele está zerado no sistema
            boxSemEstoque.classList.remove('hidden');
            
            // Trava o formulário para evitar erro
            btnSalvar.disabled = true;
            btnSalvar.classList.add('opacity-50', 'cursor-not-allowed');
            inputQtd.disabled = true;
        }
    }
</script>
{% endblock %}
