<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estoque Palhete</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], },
                    colors: {
                        primary: '#b91c1c', 'on-primary': '#ffffff', 'primary-fixed': '#fee2e2', 'on-primary-fixed-variant': '#991b1b',
                        secondary: '#15803d', 'on-secondary': '#ffffff', 'secondary-container': '#dcfce7', 'on-secondary-container': '#166534',
                        tertiary: '#b45309', 'on-tertiary': '#ffffff', 'tertiary-fixed': '#ffedd5', 'on-tertiary-fixed-variant': '#9a3412',
                        surface: '#ffffff', 'on-surface': '#1c1917', 'on-surface-variant': '#57534e',
                        'surface-container-lowest': '#ffffff', 'surface-container-low': '#f5f5f4', 'surface-container': '#e7e5e4', 'surface-container-high': '#d6d3d1', 'surface-container-highest': '#e5e5e5',
                        outline: '#d6d3d1', 'outline-variant': '#e7e5e4',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #fafaf9; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-on-surface antialiased min-h-screen relative pb-24">

    <header class="bg-surface sticky top-0 z-10 px-4 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <button class="text-primary active:scale-95 transition-transform flex items-center justify-center">
                <span class="material-symbols-outlined text-3xl">menu</span>
            </button>
            <h1 class="text-xl font-extrabold text-primary tracking-tight">Estoque Palhete</h1>
        </div>
        <button class="text-primary active:scale-95 transition-transform flex items-center justify-center">
            <span class="material-symbols-outlined text-3xl">search</span>
        </button>
    </header>

    <main class="px-4 pb-6 max-w-lg mx-auto">
        {% block content %}
        {% endblock %}
    </main>

    <nav class="bg-surface fixed bottom-0 w-full border-t border-surface-container-high pb-safe pt-2 px-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-between items-center max-w-lg mx-auto pb-4">
            
            <a href="/" class="flex flex-col items-center justify-center gap-1 w-16 {% if request.path == '/' %}text-primary{% else %}text-on-surface-variant{% endif %} no-underline active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-2xl">dashboard</span>
                <span class="text-[10px] font-bold">Início</span>
            </a>
            
            <a href="/estoque" class="flex flex-col items-center justify-center gap-1 w-16 {% if request.path == '/estoque' %}text-primary{% else %}text-on-surface-variant{% endif %} no-underline active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-2xl">inventory_2</span>
                <span class="text-[10px] font-bold">Estoque</span>
            </a>
            
            <a href="/historico" class="flex flex-col items-center justify-center gap-1 w-16 {% if request.path == '/historico' %}text-primary{% else %}text-on-surface-variant{% endif %} no-underline active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-2xl">sync_alt</span>
                <span class="text-[10px] font-bold">Movimentar</span>
            </a>
            
            <a href="/perfil" class="flex flex-col items-center justify-center gap-1 w-16 {% if request.path == '/perfil' %}text-primary{% else %}text-on-surface-variant{% endif %} no-underline active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-2xl">person</span>
                <span class="text-[10px] font-bold">Perfil</span>
            </a>
            
        </div>
    </nav>

</body>
</html>
