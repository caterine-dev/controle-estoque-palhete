<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Estoque Palhete</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#af101a",
                        "primary-container": "#d32f2f",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#fff2f0",
                        "secondary": "#1b6d24",
                        "secondary-container": "#a0f399",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#217128",
                        "tertiary": "#8b4400",
                        "tertiary-container": "#b05700",
                        "error": "#ba1a1a",
                        "background": "#f9f9f6",
                        "on-background": "#1a1c1b",
                        "surface": "#f9f9f6",
                        "on-surface": "#1a1c1b",
                        "surface-variant": "#e2e3e0",
                        "on-surface-variant": "#5b403d",
                        "outline": "#8f6f6c",
                        "surface-container-highest": "#e2e3e0",
                        "surface-container-high": "#e8e8e5",
                        "surface-container": "#eeeeeb",
                        "surface-container-low": "#f4f4f1",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #f9f9f6; min-height: max(884px, 100dvh); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .headline-font { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="text-on-background">

    <header class="fixed top-0 w-full z-50 bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-md flex justify-between items-center px-6 h-16">
        <div class="flex items-center gap-4">
            <button class="transition-all duration-300 ease-in-out active:scale-95 hover:bg-stone-200/50 p-2 rounded-full text-red-700">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <h1 class="text-xl font-extrabold text-red-700 dark:text-red-500 font-['Plus_Jakarta_Sans'] tracking-tight">Estoque Palhete</h1>
        </div>
        <button class="transition-all duration-300 ease-in-out active:scale-95 hover:bg-stone-200/50 p-2 rounded-full text-red-700">
            <span class="material-symbols-outlined">search</span>
        </button>
    </header>

    <main class="pt-20 pb-28 px-6 max-w-5xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-0 left-0 w-full h-20 bg-stone-50 dark:bg-stone-950 flex justify-around items-center px-4 pb-2 z-50 rounded-t-[2rem] shadow-[0_-10px_30px_rgba(65,0,3,0.05)] border-t border-stone-200/50 dark:border-stone-800/50">
        
        <a href="/" class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 transition-transform duration-200 active:scale-90 hover:text-red-600 no-underline">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-['Manrope'] text-xs font-semibold">Início</span>
        </a>
        
        <a href="#" class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 transition-transform duration-200 active:scale-90 hover:text-red-600 no-underline">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="font-['Manrope'] text-xs font-semibold">Estoque</span>
        </a>

        <a href="#" class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 transition-transform duration-200 active:scale-90 hover:text-red-600 no-underline">
            <span class="material-symbols-outlined">sync_alt</span>
            <span class="font-['Manrope'] text-xs font-semibold">Movimentar</span>
        </a>
        
        <a href="#" class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 transition-transform duration-200 active:scale-90 hover:text-red-600 no-underline">
            <span class="material-symbols-outlined">person</span>
            <span class="font-['Manrope'] text-xs font-semibold">Perfil</span>
        </a>
    </nav>

</body>
</html>
